services:
  wyoming-wakewordlab:
    image: ubermorgenai/wyoming-wakewordlab:latest
    restart: unless-stopped
    ports:
      - "10400:10400"
    volumes:
      - model-cache:/root/.cache/wakewordlab
    command: >
      --uri tcp://0.0.0.0:10400
      --models hey_jarvis
      --threshold 0.6
      --refractory-seconds 2.0

volumes:
  model-cache:
